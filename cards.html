<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Cards | Legends of the Alamo</title>

  <style>
    body {
      margin: 0;
      background: #0e0e0e;
      color: #f5f0e8;
      font-family: Georgia, "Times New Roman", serif;
      text-align: center;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    h1 {
      color: #d7aa3b;
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      max-width: 800px;
      margin: 20px auto;
    }

    .preview {
      width: 100%;
      max-width: 700px;
      height: auto;
      display: block;
      margin: 30px auto;
      border: 1px solid rgba(215,170,59,0.35);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      transition: transform 0.2s ease;
      cursor: zoom-in;
    }

    .preview:hover {
      transform: scale(1.02);
    }

    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background: #d7aa3b;
      color: #0e0e0e;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
      transition: opacity 0.2s ease;
    }

    .button:hover {
      opacity: 0.85;
    }

    .hint {
      color: #c9b27a;
      font-size: 0.95rem;
      margin-top: -10px;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

  <main>

    <h1>Sample Cards</h1>

    <p>
      Representative concepts showing how Legends of the Alamo cards
      can be displayed, collected, and explored.
    </p>

    <a href="Website image.png" target="_blank" rel="noopener noreferrer">
      <img
        src="Website image.png"
        alt="Legends of the Alamo sample cards"
        class="preview">
    </a>

    <p class="hint">
      Click image to view full size.
    </p>

    <p>
      Each card tells the story of a person, place, artifact,
      or moment from the Alamo.
    </p>

    <a class="button" href="index.html">
      ← Back to Home
    </a>

  </main>

</body>
</html>
