<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Cards | Legends of the Alamo</title>

  <style>
    body {
      margin: 0;
      background: #0e0e0e;
      color: #f5f0e8;
      font-family: Georgia, "Times New Roman", serif;
      text-align: center;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      color: #d7aa3b;
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 1.1;
      margin: 20px 0 15px;
    }

    .intro {
      color: #d7aa3b;
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: bold;
      line-height: 1.15;
      margin: 0 auto 35px;
      max-width: 1000px;
    }

    .preview {
      width: 100%;
      max-width: 900px;
      height: auto;
      display: block;
      margin: 0 auto 18px;
      border: 1px solid rgba(215,170,59,0.35);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .supporting-text {
      color: #f5f0e8;
      font-size: 1.2rem;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto 30px;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 25px;
    }

    .button {
      display: inline-block;
      padding: 14px 26px;
      background: #d7aa3b;
      color: #0e0e0e;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      font-size: 1.1rem;
    }

    .button.secondary {
      background: transparent;
      color: #d7aa3b;
      border: 2px solid #d7aa3b;
    }

    .button:hover {
      opacity: 0.85;
    }

    .view-full {
      display: inline-block;
      margin-top: 18px;
      color: #c9b27a;
      text-decoration: underline;
      font-size: 1rem;
    }

    .back-link {
      display: block;
      margin-top: 40px;
      color: #c9b27a;
      text-decoration: none;
      font-size: 1rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <main>

    <h1>Experience the 13-Day Siege</h1>

    <div class="intro">
      Be Among the First to Collect the Legends of the Alamo.
    </div>

    <img
      src="Website image.png"
      alt="Legends of the Alamo sample cards"
      class="preview">

    <p class="supporting-text">
      A new historical collectible experience is coming soon.
    </p>

    <div class="button-row">
      <a class="button" href="mailto:info@legendsofthealamo.com">
        Join the Muster
      </a>

      <a class="button secondary" href="mailto:info@legendsofthealamo.com">
        Support the Project
      </a>
    </div>

    <a class="view-full" href="Website image.png" target="_blank" rel="noopener noreferrer">
      View Full Size
    </a>

    <a class="back-link" href="index.html">
      ← Back to Home
    </a>

  </main>

</body>
</html>
